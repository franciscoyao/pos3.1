name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.1'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd pos_app
          flutter pub get

      - name: Build APK
        run: |
          cd pos_app
          flutter build apk --release

      - name: Build Windows
        run: |
          cd pos_app
          flutter build windows --release

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pos_app/build/app/outputs/flutter-apk/app-release.apk
            pos_app/build/windows/x64/runner/Release/pos_app.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

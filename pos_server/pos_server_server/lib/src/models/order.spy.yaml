class: PosOrder
table: pos_orders
fields:
  billId: int?
  orderCode: String?
  orderType: String?
  tableNo: String?
  status: String, default='Pending'
  waiterName: String?
  taxNumber: String?
  subtotal: double, default=0
  taxAmount: double, default=0
  serviceAmount: double, default=0
  tipAmount: double, default=0
  total: double
  initialSplitCount: int?
  remainingSplitCount: int?
  scheduledTime: DateTime?
  createdAt: DateTime?
  updatedAt: DateTime?
  items: List<OrderItem>?
indexes:
  pos_orders_order_code_idx:
    fields: orderCode
    unique: true

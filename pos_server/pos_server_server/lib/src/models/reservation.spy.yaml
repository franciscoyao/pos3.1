class: Reservation
table: reservations
fields:
  tableNumber: String
  customerName: String
  customerPhone: String?
  reservationTime: DateTime
  guestCount: int
  status: String, default='Pending' # Pending, Confirmed, Cancelled, Completed
  createdAt: DateTime
  updatedAt: DateTime?
indexes:
  reservations_table_time_idx:
    fields: tableNumber, reservationTime
